<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private Thinking Room</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      text-align: center;
      padding: 40px;
      margin: 0;
    }

    h1 {
      font-weight: 300;
      margin-bottom: 10px;
    }

    p {
      color: #aaa;
      margin-bottom: 20px;
    }

    .input-box {
      max-width: 700px;
      margin: 0 auto 20px;
    }

    textarea {
      width: 100%;
      min-height: 100px;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #1b1b1b;
      color: #eee;
      font-size: 16px;
      resize: vertical;
      box-sizing: border-box;
    }

    .buttons {
      margin-top: 20px;
    }

    .buttons button,
    .main-btn,
    .choice-btn {
      margin: 8px;
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      background: #222;
      color: #eee;
      cursor: pointer;
      transition: 0.3s;
      font-size: 15px;
    }

    .buttons button:hover,
    .main-btn:hover,
    .choice-btn:hover {
      background: #444;
    }

    .main-btn {
      background: #8c6b3f;
      color: #fff;
    }

    .main-btn:hover {
      background: #a47a42;
    }

    #output {
      max-width: 800px;
      margin: 40px auto 0;
      text-align: left;
    }

    .message {
      background: #1a1a1a;
      border: 1px solid #2f2f2f;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
      line-height: 1.6;
    }

    .flower {
      position: fixed;
      bottom: 10px;
      right: 10px;
      font-size: 30px;
    }
  </style>
</head>
<body>

  <h1>Private Thinking Room</h1>
  <p>Enter. Think freely. Leave stronger.</p>

  <div class="input-box">
    <textarea id="question" placeholder="What is on your mind right now?"></textarea>
    <br>
    <button class="main-btn" onclick="consultAll()">Enter the room</button>
    <button class="main-btn" onclick="clearRoom()">Clear room</button>
  </div>

  <div class="buttons">
    <button onclick="talk('strategist')">🧠 Strategist</button>
    <button onclick="talk('rebel')">🔥 Rebel</button>
    <button onclick="talk('empath')">🌿 Empath</button>
    <button onclick="talk('realist')">⚖️ Realist</button>
    <button onclick="talk('trickster')">🎭 Trickster</button>
    <button onclick="talk('observer')">🕯️ Observer</button>
  </div>

  <div id="output">
    <div class="message">Choose one voice… or enter the room and hear them all.</div>
  </div>

  <div class="flower">🌸🌿🌸</div>

  <script>
    let count = 0;

    function getQuestion() {
      const q = document.getElementById("question").value.trim();
      return q || "this situation";
    }

    function getMessage(role, q) {
  const negative = ["tired", "hate", "can't", "dont", "sad", "overwhelmed", "no energy"];
  const isLow = negative.some(word => q.toLowerCase().includes(word));

  const variants = {
    strategist: [
      `🧠 <strong>Strategist:</strong> If "${q}" moves your life forward long-term, go.`,
      `🧠 <strong>Strategist:</strong> Look at "${q}" as a pattern. Does it build or repeat?`
    ],

    rebel: [
      `🔥 <strong>Rebel:</strong> If you feel resistance about "${q}", maybe don’t go.`,
      `🔥 <strong>Rebel:</strong> What if skipping "${q}" changes everything?`
    ],

    empath: isLow ? [
      `🌿 <strong>Empath:</strong> You sound tired. Maybe "${q}" is not the real problem.`,
      `🌿 <strong>Empath:</strong> Be careful with yourself. You don’t have to push through everything.`
    ] : [
      `🌿 <strong>Empath:</strong> How does "${q}" affect you emotionally?`,
      `🌿 <strong>Empath:</strong> Check how "${q}" feels, not just what it means.`
    ],

    realist: [
      `⚖️ <strong>Realist:</strong> If "${q}" is required, then go.`,
      `⚖️ <strong>Realist:</strong> Remove emotion. What is objectively needed about "${q}"?`
    ],

    trickster: [
      `🎭 <strong>Trickster:</strong> Why are you asking about "${q}" if you already suspect the answer?`,
      `🎭 <strong>Trickster:</strong> Maybe "${q}" is just distraction from something bigger.`
    ],

    observer: [
      `🕯️ <strong>Observer:</strong> Watch your reaction to "${q}". That’s the real answer.`,
      `🕯️ <strong>Observer:</strong> You already know. You’re just delaying it.`
    ]
  };

  const options = variants[role];
  return options[Math.floor(Math.random() * options.length)];
      }

    function showGate() {
      document.getElementById("output").innerHTML = `
        <div class="message">
          <strong>Before we continue...</strong><br><br>
          Do you want perspective,<br>
          or are you just exploring?<br><br>

          <button class="choice-btn" onclick="choose('explore')">Just exploring</button>
          <button class="choice-btn" onclick="choose('show')">Show me</button>
        </div>
      `;
    }

    function talk(role) {
      if (count >= 3) {
        showGate();
        return;
      }

      count++;
      const q = getQuestion();
      const output = document.getElementById("output");
      output.innerHTML += `<div class="message">${getMessage(role, q)}</div>`;
    }

    function consultAll() {
  if (count >= 3) {
    showGate();
    return;
  }

  const q = getQuestion();

  if (!q || q === "this situation") {
    alert("Write your question first.");
    return;
  }

  count++;

  const output = document.getElementById("output");
  output.innerHTML = "";

  const roles = ["strategist", "rebel", "empath", "realist", "trickster", "observer"];

  roles.forEach(role => {
    output.innerHTML += `<div class="message">${getMessage(role, q)}</div>`;
  });
    }

    function choose(type) {
      if (type === "explore") {
        document.getElementById("output").innerHTML = `
          <div class="message">
            Then this is already enough.<br><br>
            More answers won’t change anything yet.
          </div>
        `;
      }

      if (type === "show") {
        document.getElementById("output").innerHTML = `
          <div class="message">
            Good.<br><br>
            Do one small thing first.<br>
            Then come back.<br><br>

            <button class="choice-btn" onclick="continueRoom()">I did something</button>
          </div>
        `;
      }
    }

    function continueRoom() {
      count = 0;
      document.getElementById("output").innerHTML = `
        <div class="message">
          Now we can actually talk.
        </div>
      `;
    }

    function clearRoom() {
      count = 0;
      document.getElementById("question").value = "";
      document.getElementById("output").innerHTML =
        `<div class="message">The room is quiet again.</div>`;
    }
  </script>

</body>
</html>
